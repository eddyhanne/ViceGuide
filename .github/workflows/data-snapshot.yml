name: Daten-Snapshot

# Spiegelt den oeffentlichen Live-Stand (MySQL ueber die API) regelmaessig als
# JSON-Schnappschuss ins Repo unter snapshots/. Zweck: ein frisch geklonter
# Repo-Stand (u.a. fuer die Arbeit mit Claude Code) ist damit hoechstens rund
# einen Tag alt, ohne dass jemand die Dateien manuell exportieren und committen
# muss. Nutzt die oeffentlichen GET-Endpunkte, also keine Zugangsdaten noetig.
# Base64-Bilder sind hier bewusst nicht enthalten (die API liefert im
# oeffentlichen GET schlanke Bild-URLs), der Snapshot bleibt dadurch klein.

on:
  schedule:
    # Alle 6 Stunden. GitHub fuehrt geplante Workflows nur "best effort" aus
    # (oft Stunden verspaetet, gelegentlich gar nicht), deshalb mehrere
    # Versuche pro Tag statt nur einem, damit der Snapshot selten laenger als
    # einen halben Tag hinterherhinkt. Committet ohnehin nur bei Aenderungen.
    - cron: '30 3,9,15,21 * * *'
  workflow_dispatch:        # zum sofortigen manuellen Anstossen ueber den Actions-Tab

concurrency:
  group: data-snapshot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Live-Daten holen und validieren
        run: |
          set -euo pipefail
          mkdir -p snapshots
          # --connect-timeout/--max-time, damit eine lahme oder haengende
          # Verbindung sauber abbricht und der Retry greift, statt den Runner
          # minutenlang blockiert haengen zu lassen. --retry-all-errors, damit
          # auch ein Timeout (nicht nur HTTP-Fehler) einen erneuten Versuch ausloest.
          CURL="curl -fsS --connect-timeout 15 --max-time 90 --retry 3 --retry-delay 5 --retry-all-errors"
          $CURL "https://viceguide.de/api/articles.php"   -o articles.raw.json
          $CURL "https://viceguide.de/api/db_entries.php" -o database.raw.json
          # Nur gueltiges JSON in der erwarteten Form uebernehmen, sonst abbrechen
          # (damit z.B. eine HTML-Fehlerseite nie als Snapshot committet wird).
          jq -e '.articles | type == "array"'  articles.raw.json > /dev/null
          jq -e '.sections | type == "object"' database.raw.json > /dev/null
          # Kanonisch formatieren (sortierte Keys) fuer stabile, aussagekraeftige Diffs.
          jq -S . articles.raw.json > snapshots/articles.json
          jq -S . database.raw.json > snapshots/database.json
          rm -f articles.raw.json database.raw.json

      - name: Committen, wenn sich etwas geaendert hat
        run: |
          set -euo pipefail
          git add snapshots/
          # --cached, damit auch der allererste Lauf greift: neue, noch nicht
          # getrackte Dateien sieht "git diff" ohne --cached gar nicht (dann
          # laeuft der Workflow gruen durch, committet aber nichts).
          if git diff --cached --quiet; then
            echo "Keine Aenderungen am Datenstand."
            exit 0
          fi
          git config user.name  "viceguide-bot"
          git config user.email "bot@users.noreply.github.com"
          A=$(jq '.articles | length' snapshots/articles.json)
          E=$(jq '[.sections[] | length] | add // 0' snapshots/database.json)
          git commit -m "Daten-Snapshot: ${A} Artikel, ${E} Datenbank-Eintraege"
          git push
